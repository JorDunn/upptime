# Bridge Upptime incidents to ntfy push notifications.
#
# Upptime opens an issue (labeled "status") when a monitor goes down or
# degrades, and closes it on recovery — this forwards both transitions to
# the self-hosted ntfy (topic "upptime"). NTFY_TOKEN is a tk_ token for the
# ntfy admin user (Bitwarden: ntfy-token); ntfy.nodetwo.io is Access-bypassed
# and enforces its own deny-all + token auth.
#
# NOT part of the upstream template — keep this file when merging template
# updates.
name: ntfy alerts

on:
  issues:
    types: [opened, reopened, closed]

permissions:
  issues: read

jobs:
  notify:
    name: Push incident to ntfy
    if: contains(github.event.issue.labels.*.name, 'status')
    runs-on: ubuntu-latest
    steps:
      - name: Publish
        env:
          NTFY_TOKEN: ${{ secrets.NTFY_TOKEN }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_URL: ${{ github.event.issue.html_url }}
          ACTION: ${{ github.event.action }}
        run: |
          if [ "$ACTION" = "closed" ]; then
            title="Resolved: $ISSUE_TITLE"
            priority=default
            tags=white_check_mark
          else
            title="$ISSUE_TITLE"
            priority=high
            tags=rotating_light
          fi
          curl -fsS \
            -H "Authorization: Bearer $NTFY_TOKEN" \
            -H "Title: $title" \
            -H "Priority: $priority" \
            -H "Tags: $tags" \
            -H "Click: $ISSUE_URL" \
            -d "$ISSUE_URL" \
            https://ntfy.nodetwo.io/upptime
